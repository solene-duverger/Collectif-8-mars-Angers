backend:
  name: git-gateway
  branch: main

media_folder: static/images
public_folder: /images

locale: fr

slug:
  encoding: "ascii"
  clean_accents: true

collections:
  - name: "evenements"
    label: "Événements"
    label_singular: "Événement"
    folder: "content/evenements"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - label: "Type"
        name: "type_evenement"
        widget: "select"
        options:
          - { label: "Mobilisation / Manif", value: "mobilisation" }
          - { label: "Culture / Spectacle", value: "culture" }
          - { label: "Formation / Atelier", value: "formation" }
          - { label: "Réunion", value: "reunion" }
      - { label: "Lieu", name: "lieu", widget: "string" }
      - { label: "Description courte", name: "description", widget: "text" }
      - { label: "Détails", name: "body", widget: "markdown", required: false }
      - { label: "Brouillon", name: "draft", widget: "boolean", default: false }

  - name: "associations"
    label: "Associations"
    files:
      - label: "Liste des associations"
        name: "associations_list"
        file: "data/associations.json"
        fields:
          - label: "Associations"
            name: "associations"
            widget: "list"
            fields:
              - { label: "Nom", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Emoji", name: "icon", widget: "string" }
              - { label: "Couleur", name: "color", widget: "string", default: "#E63946" }
              - { label: "Lien site web", name: "url", widget: "string", required: false }

  - name: "settings"
    label: "Paramètres du site"
    files:
      - label: "Paramètres généraux"
        name: "config"
        file: "hugo.toml"
        fields:
          - { label: "Titre du site", name: "title", widget: "string" }
          - label: "Paramètres"
            name: "params"
            widget: "object"
            fields:
              - { label: "Description", name: "description", widget: "string" }
              - { label: "Slogan", name: "tagline", widget: "string" }
              - { label: "Texte du manifeste", name: "manifesto", widget: "text" }
              - { label: "Email de contact", name: "contactEmail", widget: "string" }
