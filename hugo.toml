# Configuration de base
baseURL = 'https://collectif-8-mars-angers.netlify.app/'
languageCode = 'fr-fr'
defaultContentLanguage = 'fr'
title = 'Collectif 8 Mars Angers'
theme = 'votre-theme'  # À modifier selon votre thème (ananke, mainroad, etc.)

# Métadonnées et SEO
author = 'Collectif 8 Mars Angers'
copyright = 'Collectif 8 Mars Angers - Tous droits réservés'
enableEmoji = true
enableRobotsTXT = true
googleAnalytics = ''  # Votre code UA si vous en avez un

# Configuration des URLs
canonifyURLs = true
relativeURLs = false
uglyURLs = false
paginate = 10
paginatePath = 'page'

# Formats de contenu
taxonomies:
  category = 'categories'
  tag = 'tags'
  auteur = 'auteurs'

# Paramètres personnalisés
[params]
  # Informations générales
  description = 'Collectif féministe d\'associations à Angers pour les droits des femmes'
  subtitle = 'Ensemble pour l\'égalité et les droits des femmes'
  organization = 'Collectif 8 Mars Angers'
  email = 'contact@collectif8mars49.fr'  # À modifier
  
  # Apparence
  colorTheme = 'red'  # rouge pour le 8 mars !
  backgroundColor = '#ffffff'
  textColor = '#333333'
  accentColor = '#e74c3c'  # Rouge
  
  # Logo et images
  logo = '/images/logo.png'
  favicon = '/images/favicon.ico'
  coverImage = '/images/cover.jpg'
  
  # Réseaux sociaux
  [params.social]
    facebook = 'https://facebook.com/collectif8mars49'
    instagram = 'https://instagram.com/collectif8mars49'
    twitter = 'https://twitter.com/collectif8mars'
    linkedin = 'https://linkedin.com/company/collectif8mars49'
  
  # Coordonnées
  [params.contact]
    address = 'Angers, France'
    phone = '+33 6 12 34 56 78'  # À modifier
    email = 'contact@collectif8mars49.fr'
    
  # Informations légales
  [params.legal]
    siret = ''  # Si vous avez un numéro SIRET
    association = 'Loi 1901'
    publication = 'Collectif 8 Mars Angers'

# Menu principal
[menu]
  [[menu.main]]
    identifier = 'accueil'
    name = 'Accueil'
    url = '/'
    weight = 1
    pre = '<span class="red">8</span>'
  
  [[menu.main]]
    identifier = 'collectif'
    name = 'Le collectif'
    url = '/collectif/'
    weight = 2
    
  [[menu.main]]
    identifier = 'associations'
    name = 'Associations'
    url = '/associations/'
    weight = 3
    
  [[menu.main]]
    identifier = 'agenda'
    name = 'Agenda'
    url = '/agenda/'
    weight = 4
    
  [[menu.main]]
    identifier = 'actualites'
    name = 'Actualités'
    url = '/actualites/'
    weight = 5
    
  [[menu.main]]
    identifier = 'contact'
    name = 'Contact'
    url = '/contact/'
    weight = 6

# Menu mobile (celui que vous aviez dans hugo.toml)
[[menu.mobile]]
  identifier = 'accueil-mobile'
  name = 'Accueil'
  url = '/#accueil'
  weight = 1
  parent = 'mobile'

[[menu.mobile]]
  identifier = 'collectif-mobile'
  name = 'Le collectif'
  url = '/#collectif'
  weight = 2
  parent = 'mobile'

[[menu.mobile]]
  identifier = 'associations-mobile'
  name = 'Associations'
  url = '/#associations'
  weight = 3
  parent = 'mobile'

[[menu.mobile]]
  identifier = 'agenda-mobile'
  name = 'Agenda'
  url = '/#agenda'
  weight = 4
  parent = 'mobile'

[[menu.mobile]]
  identifier = 'contact-mobile'
  name = 'Contact'
  url = '/#contact'
  weight = 5
  parent = 'mobile'

# Menu footer
[[menu.footer]]
  identifier = 'mentions-legales'
  name = 'Mentions légales'
  url = '/mentions-legales/'
  weight = 1

[[menu.footer]]
  identifier = 'confidentialite'
  name = 'Politique de confidentialité'
  url = '/confidentialite/'
  weight = 2

# Modules et fonctionnalités
[module]
  [[module.mounts]]
    source = 'static'
    target = 'static'
  [[module.mounts]]
    source = 'layouts'
    target = 'layouts'
  [[module.mounts]]
    source = 'content'
    target = 'content'

# Configuration des fichiers statiques
[outputs]
  home = ['HTML', 'RSS', 'JSON']
  page = ['HTML']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']
  term = ['HTML', 'RSS']

# Configuration des médias
[mediaTypes]
  [mediaTypes.'application/manifest+json']
    suffixes = ['json']

[outputFormats]
  [outputFormats.MANIFEST]
    mediaType = 'application/manifest+json'
    baseName = 'manifest'
    isPlainText = true
    notAlternative = true

# Minification (pour la performance)
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
  [minify.tdewolff]
    html:
      keepWhitespace = false
      keepQuotes = false
      keepEndTags = false

# Configuration des assets (images, etc.)
[imaging]
  resampleFilter = 'Box'
  quality = 85
  anchor = 'Smart'

# Cache et performance
[caches]
  [caches.getjson]
    dir = ':cacheDir/:project'
    maxAge = '30m'
  [caches.images]
    dir = ':cacheDir/:project'
    maxAge = '30m'
  [caches.assets]
    dir = ':resourceDir/_gen'
    maxAge = -1

# Langues (si vous voulez un site multilingue)
[languages]
  [languages.fr]
    languageCode = 'fr-fr'
    languageName = 'Français'
    weight = 1
    title = 'Collectif 8 Mars Angers'
    [languages.fr.params]
      description = 'Collectif féministe d\'associations à Angers'
  # Décommentez si vous voulez une version anglaise
  #[languages.en]
  #  languageCode = 'en-us'
  #  languageName = 'English'
  #  weight = 2
  #  title = 'March 8 Collective Angers'
  #  [languages.en.params]
  #    description = 'Feminist collective of associations in Angers'

# Sécurité
[security]
  [security.exec]
    allow = ['^dart-sass-embedded$', '^go$', '^npx$', '^postcss$']
    osEnv = ['(?i)^(PATH|PATHEXT|APPDATA|TMP|TEMP|TERM)$']

# Services externes
[services]
  [services.googleAnalytics]
    id = ''  # Votre ID Google Analytics
  [services.disqus]
    shortname = ''  # Votre shortname Disqus si vous utilisez les commentaires
